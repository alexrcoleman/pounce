name: Deploy Production to Cloud Run

on:
  schedule:
    # GitHub schedules are UTC. This is midnight Pacific Standard Time.
    - cron: "0 8 * * *"
  workflow_dispatch:
    inputs:
      ref:
        description: Branch, tag, or SHA to deploy
        required: false
        default: main
      force:
        description: Deploy even if production already has this SHA
        required: false
        type: boolean
        default: false

concurrency:
  group: cloud-run-production
  cancel-in-progress: false

env:
  PROJECT_ID: pounce-409615
  SERVICE: pounce
  STAGING_SERVICE: pounce-staging
  REGION: us-east4
  ARTIFACT_REPOSITORY: cloud-run-source-deploy
  NODE_VERSION: 18.x
  PRODUCTION_SITE_URL: https://pounce.live
  DRAIN_WAIT_SECONDS: 300
  DRAIN_MAX_ATTEMPTS: 6
  DRAIN_RETRY_SECONDS: 10

jobs:
  deploy:
    name: Promote checked staging SHA to production
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref || github.sha }}

      - name: Record target SHA
        id: target
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Check deploy configuration
        env:
          GAME_SERVER_DRAIN_SECRET: ${{ secrets.GAME_SERVER_DRAIN_SECRET }}
          GCP_SERVICE_ACCOUNT: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          GCP_WORKLOAD_IDENTITY_PROVIDER: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
        run: |
          test -n "$GAME_SERVER_DRAIN_SECRET" || { echo "::error::Set repository secret GAME_SERVER_DRAIN_SECRET."; exit 1; }
          test -n "$GCP_WORKLOAD_IDENTITY_PROVIDER" || { echo "::error::Set repository secret GCP_WORKLOAD_IDENTITY_PROVIDER."; exit 1; }
          test -n "$GCP_SERVICE_ACCOUNT" || { echo "::error::Set repository secret GCP_SERVICE_ACCOUNT."; exit 1; }

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          project_id: ${{ env.PROJECT_ID }}
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v3

      - name: Check staging and production SHAs
        id: deploy_state
        env:
          FORCE_DEPLOY: ${{ inputs.force || false }}
          TARGET_SHA: ${{ steps.target.outputs.sha }}
        run: |
          set -euo pipefail

          staging_sha="$(gcloud run services describe "$STAGING_SERVICE" \
            --project "$PROJECT_ID" \
            --region "$REGION" \
            --format='value(metadata.labels.source-sha)' 2>/dev/null || true)"

          production_sha="$(gcloud run services describe "$SERVICE" \
            --project "$PROJECT_ID" \
            --region "$REGION" \
            --format='value(metadata.labels.source-sha)' 2>/dev/null || true)"

          echo "target_sha=$TARGET_SHA" >> "$GITHUB_OUTPUT"
          echo "staging_sha=$staging_sha" >> "$GITHUB_OUTPUT"
          echo "production_sha=$production_sha" >> "$GITHUB_OUTPUT"

          if [ "$staging_sha" != "$TARGET_SHA" ]; then
            echo "::warning::Staging has source SHA '$staging_sha', not target '$TARGET_SHA'. Deploy staging first."
            echo "should_deploy=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "$production_sha" = "$TARGET_SHA" ] && [ "$FORCE_DEPLOY" != "true" ]; then
            echo "Production already has source SHA $TARGET_SHA."
            echo "should_deploy=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "should_deploy=true" >> "$GITHUB_OUTPUT"

      - name: Set up Node
        if: steps.deploy_state.outputs.should_deploy == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        if: steps.deploy_state.outputs.should_deploy == 'true'
        run: npm ci

      - name: Type check
        if: steps.deploy_state.outputs.should_deploy == 'true'
        run: npx tsc --noEmit

      - name: Apply Artifact Registry cleanup policy
        if: steps.deploy_state.outputs.should_deploy == 'true'
        run: |
          gcloud artifacts repositories set-cleanup-policies "$ARTIFACT_REPOSITORY" \
            --project "$PROJECT_ID" \
            --location "$REGION" \
            --policy deploy/artifact-registry-cleanup-policy.json \
            --no-dry-run \
            --quiet

      - name: Enable production Docker build features
        if: steps.deploy_state.outputs.should_deploy == 'true'
        run: |
          printf '%s\n' \
            "NEXT_PUBLIC_SITE_URL=$PRODUCTION_SITE_URL" \
            "POUNCE_DEPLOY_ENV=production" \
            "POUNCE_BUILD_STORYBOOK=false" \
            > .pounce-build-env

      - name: Begin game server drain
        if: steps.deploy_state.outputs.should_deploy == 'true'
        env:
          GAME_SERVER_DRAIN_SECRET: ${{ secrets.GAME_SERVER_DRAIN_SECRET }}
        run: |
          set -euo pipefail

          service_url="$(gcloud run services describe "$SERVICE" \
            --project "$PROJECT_ID" \
            --region "$REGION" \
            --format='value(status.url)' 2>/dev/null || true)"

          if [ -z "$service_url" ]; then
            echo "::warning::Cloud Run service URL was not found; skipping drain for this deploy."
            exit 0
          fi

          response_file="$(mktemp)"
          error_file="$(mktemp)"
          attempt=1

          while [ "$attempt" -le "$DRAIN_MAX_ATTEMPTS" ]; do
            : > "$response_file"
            : > "$error_file"
            status="000"

            if status="$(curl -sS --connect-timeout 10 --max-time 30 \
              -o "$response_file" \
              -w "%{http_code}" \
              -X POST "$service_url/api/admin/drain" \
              -H "Authorization: Bearer $GAME_SERVER_DRAIN_SECRET" \
              2> "$error_file")"; then
              true
            else
              status="000"
            fi

            if [ "$status" -ge 200 ] && [ "$status" -lt 300 ]; then
              cat "$response_file"
              echo "Waiting $DRAIN_WAIT_SECONDS seconds before deploying..."
              sleep "$DRAIN_WAIT_SECONDS"
              exit 0
            fi

            if [ "$status" = "404" ]; then
              echo "::warning::Drain endpoint is not live yet; proceeding with bootstrap deploy."
              exit 0
            fi

            if [ "$status" = "401" ] || [ "$status" = "403" ]; then
              cat "$response_file"
              echo "::error::Game server drain request was unauthorized with HTTP $status."
              exit 1
            fi

            if [ "$status" = "000" ] ||
              [ "$status" = "408" ] ||
              [ "$status" = "429" ] ||
              { [ "$status" -ge 500 ] && [ "$status" -lt 600 ]; }; then
              if [ "$attempt" -eq "$DRAIN_MAX_ATTEMPTS" ]; then
                cat "$response_file"
                cat "$error_file"
                echo "::warning::Game server drain stayed unavailable after $DRAIN_MAX_ATTEMPTS attempts; proceeding with deploy."
                exit 0
              fi

              echo "Drain attempt $attempt/$DRAIN_MAX_ATTEMPTS failed with HTTP $status; retrying in $DRAIN_RETRY_SECONDS seconds..."
              sleep "$DRAIN_RETRY_SECONDS"
              attempt=$((attempt + 1))
              continue
            fi

            cat "$response_file"
            echo "::error::Game server drain request failed with HTTP $status."
            exit 1
          done

      - name: Deploy to Cloud Run production
        if: steps.deploy_state.outputs.should_deploy == 'true'
        id: deploy
        uses: google-github-actions/deploy-cloudrun@v3
        with:
          project_id: ${{ env.PROJECT_ID }}
          service: ${{ env.SERVICE }}
          region: ${{ env.REGION }}
          source: .
          env_vars: |
            GAME_SERVER_DRAIN_SECRET=${{ secrets.GAME_SERVER_DRAIN_SECRET }}
            GAME_SERVER_DRAIN_WINDOW_MS=300000
            NEXT_PUBLIC_SITE_URL=${{ env.PRODUCTION_SITE_URL }}
            POUNCE_DEPLOY_ENV=production
            POUNCE_SOURCE_SHA=${{ steps.target.outputs.sha }}
          env_vars_update_strategy: merge
          labels: |
            environment=production
            source-sha=${{ steps.target.outputs.sha }}
          flags: >-
            --startup-probe=httpGet.path=/api/startup/ready,httpGet.port=8080,initialDelaySeconds=0,periodSeconds=2,timeoutSeconds=1,failureThreshold=60

      - name: Show deployment result
        run: |
          echo "target=${{ steps.target.outputs.sha }}"
          echo "staging=${{ steps.deploy_state.outputs.staging_sha }}"
          echo "production_before=${{ steps.deploy_state.outputs.production_sha }}"
          echo "deployed=${{ steps.deploy_state.outputs.should_deploy }}"
          if [ "${{ steps.deploy_state.outputs.should_deploy }}" = "true" ]; then
            echo "${{ steps.deploy.outputs.url }}"
          fi
